
services:
  frontend:
    build:
      context: ../../
      dockerfile: build/docker/Dockerfile.dev
    ports:
      - '3000:3000'
    env_file:
      - .env
    volumes:
      - ../../src:/app/src
      - ../../public:/app/public
    networks:
      - frontend_network

networks:
  frontend_network:
    driver: bridge

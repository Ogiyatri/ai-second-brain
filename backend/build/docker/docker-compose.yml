
services:
  backend:
    image: ai-second-brain-backend
    container_name: ai_second_brain_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-3001}:3001"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - ai_brain_network

  db:
    image: pgvector/pgvector:pg16
    container_name: ai_second_brain_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_EXTERNAL_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_brain_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ai_second_brain_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT:-8081}:80"
    depends_on:
      - db
    networks:
      - ai_brain_network

  minio:
    image: minio/minio:latest
    container_name: ai_second_brain_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - ai_brain_network

volumes:
  postgres_data:
  minio_data:

networks:
  ai_brain_network:
    driver: bridge
